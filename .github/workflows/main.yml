name: Build Apple Unity Plugins

on:
  workflow_dispatch:

jobs:
  build-tgz:
    runs-on: macos-latest
    
    steps:
      - name: Lấy mã nguồn Apple
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Biên dịch thư viện Native (Bypass Unity & visionOS)
        # -b Build: Chỉ chạy Xcode build, không gọi Unity để Pack tránh lỗi 254.
        # -p Core GameKit: Chỉ định rõ 2 module cần thiết, bỏ qua SpatialController.
        run: |
          python3 build.py -b Build -p Core GameKit

      - name: Đóng gói .tgz thủ công bằng NPM
        run: |
          mkdir -p Build_TGZ
          
          # Tìm tất cả file package.json trong thư mục plug-ins và tự động chạy lệnh npm pack
          find plug-ins -name "package.json" -type f -execdir npm pack \;
          
          # Gom tất cả các file .tgz vừa được sinh ra về chung một thư mục
          find plug-ins -name "*.tgz" -exec mv {} Build_TGZ/ \;

      - name: Xuất file thành phẩm (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Apple-Plugins-TGZ
          path: Build_TGZ/*.tgz
